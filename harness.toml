# dinner-harness manifest — single source of truth for the custom Claude Code / Codex harness.
# Read by adapters/*.py (stdlib tomllib only). Hand-edit the canonical tree, then
# `py -3 install.py --target claude` regenerates ~/.claude. See README.md.

[meta]
name = "dinner-harness"
description = "Custom harness: tool-neutral content/ + claude-native assets/claude/, installed per target."

[vars]
# Token used inside templated source files; the adapter substitutes the real value
# (resolved from the install environment / --username) at install time.
username_token = "<USERNAME>"

[targets.claude]
# Verbatim copies. Each entry: [src (repo-relative), dest (target-root-relative)].
# src may be a file or a directory (recursive). Directories honor the exclude lists below.
copy = [
  ["content/instructions/CLAUDE.md",      "CLAUDE.md"],
  ["content/rules",                       "rules"],
  ["content/skills",                      "skills"],
  ["content/agents",                      "agents"],
  ["content/roles",                       "roles"],
  ["content/templates",                   "templates"],
  ["content/ecc-reference",               "ecc-reference"],
  ["content/docs",                        "docs"],
  ["assets/claude/hooks",                 "hooks"],
  ["assets/claude/README.md",             "README.md"],
  ["assets/claude/MCP-UNREAL-SETUP.md",   "MCP-UNREAL-SETUP.md"],
  ["assets/claude/settings.json.template", "settings.json.template"],
  ["assets/claude/gitignore",             ".gitignore"],
]

# Generated by variable substitution. The adapter replaces `username_token` with the
# real username and, for JSON dests, drops `strip_keys` (machine/runtime-only fields).
[[targets.claude.template]]
src = "assets/claude/settings.json.template"
dest = "settings.json"
strip_keys = ["_template"]

# Workflow state files: written only when the dest does not already exist
# (never clobber a live HANDOFF/RESULT). Each entry: [src, dest].
skip_if_exists = [
  ["assets/claude/HANDOFF.template.md", "HANDOFF.md"],
  ["assets/claude/RESULT.template.md",  "RESULT.md"],
]

# Directory basenames and file suffixes pruned from every copy AND from the
# lossless-diff comparison: runtime/cache artifacts that are not harness content.
exclude_dir_names = ["__pycache__", "logs", "_staging"]
exclude_file_suffixes = [".pyc", ".pyo", ".pyd"]
