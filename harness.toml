# dinner-harness manifest — single source of truth for the custom Claude Code / Codex harness.
# Read by adapters/*.py (stdlib tomllib only). Hand-edit the canonical tree, then
# `py -3 install.py --target claude` regenerates ~/.claude. See README.md.

[meta]
name = "dinner-harness"
description = "Custom harness: tool-neutral content/ + claude-native assets/claude/, installed per target."

[vars]
# Tokens used inside templated source files; the adapter substitutes the real value
# at install time. username_token from the install environment / --username;
# claude_home_token from the install dest (drive + path), so hook command paths are
# not pinned to C: and follow a custom --dest.
username_token = "<USERNAME>"
claude_home_token = "<CLAUDE_HOME>"

[targets.claude]
# Verbatim copies. Each entry: [src (repo-relative), dest (target-root-relative)].
# src may be a file or a directory (recursive). Directories honor the exclude lists below.
copy = [
  ["content/instructions/CLAUDE.md",      "CLAUDE.md"],
  ["content/rules",                       "rules"],
  ["content/skills",                      "skills"],
  ["content/agents",                      "agents"],
  ["content/roles",                       "roles"],
  ["content/templates",                   "templates"],
  ["content/ecc-reference",               "ecc-reference"],
  ["content/docs",                        "docs"],
  ["assets/claude/hooks",                 "hooks"],
  ["orchestrate.py",                      "orchestrate.py"],
  ["orchestrator",                        "orchestrator"],
  ["assets/claude/README.md",             "README.md"],
  ["assets/claude/MCP-UNREAL-SETUP.md",   "MCP-UNREAL-SETUP.md"],
  ["assets/claude/settings.json.template", "settings.json.template"],
  ["assets/claude/gitignore",             ".gitignore"],
]

# Generated by variable substitution. The adapter replaces `username_token` with the
# real username and, for JSON dests, drops `strip_keys` (machine/runtime-only fields).
# Inline-table array so these stay direct keys of [targets.claude] regardless of order.
template = [
  { src = "assets/claude/settings.json.template", dest = "settings.json", strip_keys = ["_template"], merge = true },
]

# Workflow state files: written only when the dest does not already exist
# (never clobber a live HANDOFF/RESULT). Each entry: [src, dest].
skip_if_exists = [
  ["assets/claude/HANDOFF.template.md", "HANDOFF.md"],
  ["assets/claude/RESULT.template.md",  "RESULT.md"],
]

# Directory basenames and file suffixes pruned from every copy AND from the
# lossless-diff comparison: runtime/cache artifacts that are not harness content.
exclude_dir_names = ["__pycache__", "logs", "_staging", "tests"]
exclude_file_suffixes = [".pyc", ".pyo", ".pyd"]

[targets.codex]
# codex target: portable subset only (Cycle 2, D1/D7/D8). No templating, no skip-if-exists.
# Claude-only machinery (agents, hooks, roles, agent-routing, _mode) is dropped by this adapter
# — a design decision (newer Codex supports hooks/agents but the semantics don't fully map; see
# CODEX-RECON.md), accounted for in CODEX-COVERAGE.md. MCP is out of scope (no source; D5).
copy = [
  ["assets/codex/AGENTS.md",  "AGENTS.md"],
  ["content/ecc-reference",   "ecc-reference"],
  ["content/docs",            "docs"],
  ["content/templates",       "templates"],
]

# Skills: copy content/skills/* EXCEPT the Claude-machinery skills (D8). The dropped ones
# route to Claude subagents (bp/gas/umg/ue/repl), operate on the ~/.claude harness
# (harness-review, learnings-review), or fan out a multi-agent Task panel (adversarial-review);
# their hub-leaf routing / harness / panel semantics don't map to Codex (which has custom agents,
# but not that orchestration) — dropped by design (CODEX-RECON.md). autonomous-loop is KEPT as a
# degraded copy: its loop is portable, only the panel step goes inert (see CODEX-COVERAGE.md).
skills_src = "content/skills"
skills_dest = "skills"
skills_drop = ["bp", "gas", "umg", "ue", "repl", "harness-review", "learnings-review", "adversarial-review", "delegate"]

# Codex 0.140+ native hooks. Copy only the portable Python implementation;
# Claude launchers are intentionally excluded because they point at ~/.claude.
hooks_copy = [
  ["assets/claude/hooks/handlers", "hooks/handlers"],
  ["assets/claude/hooks/lib",      "hooks/lib"],
  ["assets/claude/hooks/rules",    "hooks/rules"],
  ["assets/claude/hooks/README.md", "hooks/README.md"],
]
hooks_json = true

# Codex 0.140+ custom agents. Markdown frontmatter/body is converted to
# ~/.codex/agents/*.toml by adapters/codex.py.
agents_src = "content/agents"
agents_dest = "agents"

exclude_dir_names = ["__pycache__", "logs", "_staging", "tests"]
exclude_file_suffixes = [".pyc", ".pyo", ".pyd"]
